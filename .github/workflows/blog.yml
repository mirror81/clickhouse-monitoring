name: Blog

# Builds the standalone Astro blog app (apps/blog). It is intentionally outside
# the root bun workspace (like apps/landing and apps/docs), so it installs and
# builds on its own rather than via turbo. Posts live in apps/blog/src/content/blog.

on:
  pull_request:
    paths:
      - 'apps/blog/**'
      - '.github/workflows/blog.yml'
  push:
    branches: [main]
    paths:
      - 'apps/blog/**'
      - '.github/workflows/blog.yml'

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/blog
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
