name: CLI Rust Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'chm-v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: chm
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: chm
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: chm
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: chm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          # ch-monitor-cli is a member of the rust/ Cargo workspace, so it
          # builds into the shared rust/target dir.
          workspaces: rust -> target
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        working-directory: rust/ch-monitor-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          # The crate's [[bin]] is named `chm` (so `cargo install` matches the docs).
          cp rust/target/${{ matrix.target }}/release/chm dist/${{ matrix.bin }}-${{ matrix.target }}
          cd dist
          shasum -a 256 ${{ matrix.bin }}-${{ matrix.target }} > ${{ matrix.bin }}-${{ matrix.target }}.sha256
      - uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: dist/*
