name: Docs

# Builds the standalone Astro Starlight docs app (apps/docs). It is intentionally
# outside the root bun workspace (see apps/docs/README.md), so it installs and
# builds on its own rather than via turbo. docs/content/** is the committed
# source the site is generated from by scripts/sync-docs.mjs.

on:
  pull_request:
    paths:
      - 'apps/docs/**'
      - 'docs/content/**'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'docs/content/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/docs
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Install Chromium (for smoke test)
        run: pnpm exec playwright-core install --with-deps chromium

      - name: Smoke test (crawl every doc page, fail on render errors)
        run: pnpm run smoke
