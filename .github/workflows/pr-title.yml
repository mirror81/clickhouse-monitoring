name: PR Title

# Squash-merges use the PR title as the commit message, and release-please reads
# those commits to bump the version and group the changelog. An invalid title is
# silently dropped from the release, so validate it against the SAME
# commitlint.config.js the local husky hook uses — one source of truth.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conventional-title:
    name: conventional-title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      # Install so commitlint resolves from the repo's pinned devDependencies
      # (incl. the conventional-changelog-conventionalcommits transitive dep),
      # instead of a flaky `bunx --bun commitlint@latest` npm fetch at check time.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR title is a conventional commit
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Validating PR title: $PR_TITLE"
          echo "$PR_TITLE" | pnpm exec commitlint --config commitlint.config.js
