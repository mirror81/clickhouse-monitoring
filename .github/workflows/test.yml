name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for same workflow and branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLICKHOUSE_HOST: http://localhost:8123
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: ''
  CLICKHOUSE_SKIP_USER_SETUP: 1
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  id-token: write

jobs:
  # Full Bun test suite with coverage - run first
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # `bun test --isolate` (used by the test scripts to give each file a
          # fresh global, preventing cross-file mock.module leakage) needs a
          # recent Bun. 1.3.13's lcov coverage writer intermittently throws
          # `WriteFailed` after all tests already passed; 1.3.14 fixes it.
          bun-version: '1.3.14'

      - name: Install dependencies
        run: pnpm install

      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: pnpm install --frozen-lockfile

      - name: Run Bun tests with coverage
        working-directory: apps/dashboard
        # Uses the lcov-only CI script (drops --coverage-reporter=text) — the
        # giant per-file text table appears to trip a large-stdout-write bug
        # in Bun's coverage reporter (`error: An internal error occurred
        # (WriteFailed)`) even on 1.3.14. lcov is all codecov-action needs.
        run: pnpm run test:coverage:ci

      - name: Run workspace package tests with coverage
        run: pnpm run test:packages:ci

      - name: Upload Bun coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./apps/dashboard/coverage/lcov.info,./coverage/lcov.info
          flags: bun
          fail_ci_if_error: true
          use_oidc: true

  # E2E smoke for the TanStack Start app. Builds the Node target and self-serves
  # on localhost (NOT the live edge worker — Cloudflare's bot WAF 403s CI/datacenter
  # IPs). CHM_API_KEY_SECRET enables the /api/v1 auth gate so menu-counts returns
  # 401 before any ClickHouse access — no DB service needed. Non-blocking.
  e2e-test:
    runs-on: ubuntu-latest
    # 35m, up from 20m: this job both BUILDS the heavy Node target (Vite build +
    # prerender of 119 routes running the un-stubbed real render libs — dagre,
    # recharts, mermaid — since the Node target keeps them, see vite.config.ts
    # `if (isNode) return null`) AND runs the e2e suite. The build alone was
    # creeping toward the old 20m ceiling and timing out before the specs ran
    # (e.g. #1506), so the e2e gate never executed. 35m leaves headroom for the
    # build + the full Cypress run; the Bun cache below claws back install time.
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cypress Cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-cypress-v1-

      - name: Install dependencies
        working-directory: apps/dashboard
        run: pnpm install --frozen-lockfile

      - name: Build Node target
        working-directory: apps/dashboard
        # CHM_SKIP_PRERENDER=1: skip the 119-route prerender for the e2e build.
        # It runs the un-stubbed real render libs (dagre/recharts/mermaid) across
        # every route and takes >30 min on a CI runner — the job was cancelled
        # mid-prerender before any spec ran. e2e exercises runtime behaviour
        # against the SPA fallback shell with client-fetched data, so prerendered
        # HTML is unnecessary here. Production (Docker) build still prerenders.
        run: bun scripts/build-node-ci.ts

      - name: Start server + run E2E
        working-directory: apps/dashboard
        run: |
          node .output/server/index.mjs &
          SERVER_PID=$!
          # Wait up to 60s for the server to accept connections.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health >/dev/null || { echo "server never came up"; kill $SERVER_PID; exit 1; }
          pnpm run test:e2e:headless
          STATUS=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $STATUS
        env:
          CYPRESS_BROWSER: chrome
          CYPRESS_BASE_URL: http://localhost:3000
          PORT: '3000'
          # Enables the API-key gate so /api/v1/* returns 401 without touching CH.
          CHM_API_KEY_SECRET: ci-e2e-secret
          CHM_AUTH_PROVIDER: none

  # Query config tests - latest ClickHouse only
  test-queries-config:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.2
        ports:
          - 8123:8123
        options: >-
          --health-cmd "CLICKHOUSE_SKIP_USER_SETUP=1 wget --no-verbose --tries=1 --spider http://localhost:8123/?query=SELECT%201 || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 5s
        env:
          CLICKHOUSE_SKIP_USER_SETUP: 1

      keeper:
        image: clickhouse/clickhouse-keeper:26.2
        options: >-
          --health-cmd "clickhouse-keeper client -h 127.0.0.1 -p 9181 -q 'ruok' 2>/dev/null | grep -q imok || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 5s

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: pnpm install

      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: pnpm install --frozen-lockfile

      - name: Test queries config
        working-directory: apps/dashboard
        run: pnpm run test:query-config

      - name: Run package integration tests
        run: pnpm run test:packages:ci

  # Live Postgres integration tests for the postgres-source path (@chm/postgres-client
  # + the dashboard's executePgQuery/SSRF guard). Started via `docker run` (not
  # `services:`) because `pg_stat_statements` needs `shared_preload_libraries` at
  # server start, which `services:` containers can't override. Not a required
  # check — self-skips everywhere else via `describe.skipIf(!POSTGRES_HOST)`.
  test-postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: chm_test
      POSTGRES_SSLMODE: disable
      CHM_ALLOW_PRIVATE_HOSTS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: pnpm install

      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: pnpm install --frozen-lockfile

      - name: Start Postgres (with pg_stat_statements preloaded)
        run: |
          docker run -d --name pg -p 5432:5432 \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_DB=chm_test \
            postgres:17 -c shared_preload_libraries=pg_stat_statements

          for i in $(seq 1 30); do
            if docker exec pg pg_isready -U postgres >/dev/null 2>&1; then
              echo "Postgres is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Postgres never became ready"
              docker logs pg
              exit 1
            fi
            sleep 1
          done

          docker exec pg psql -U postgres -d chm_test \
            -c 'CREATE EXTENSION IF NOT EXISTS pg_stat_statements;'

      - name: Run Postgres integration tests
        run: pnpm run test:pg-integration
