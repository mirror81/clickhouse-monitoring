# wrangler.toml for the chmonitor blog worker.
#
# Static-assets-only Worker: Astro builds to ./dist, served directly by Workers
# Assets (no `main` script).
#
# Deploy: cd apps/blog && pnpm run build && wrangler deploy

name = "chmonitor-blog"
compatibility_date = "2026-05-28"

# Workers Cache (launched 2026-07-06): Cloudflare's tiered cache in front of this
# Worker. This is a static-assets-only Worker (Astro → Workers Assets), and the
# built assets already ship their own `Cache-Control` headers, so there is no
# server entry to set headers in — enabling this simply layers Cloudflare's
# tiered edge cache in front of them. Safe by default: nothing is stored without
# an explicit public `Cache-Control`. See docs/knowledge/workers-cache.md.
[cache]
enabled = true

[assets]
directory = "./dist"

[[routes]]
pattern = "blog.chmonitor.dev"
custom_domain = true

# Preview environment for PR deployments.
[env.preview]
name = "preview-chmonitor-blog"

[env.preview.assets]
directory = "./dist"

[[env.preview.routes]]
pattern = "preview.blog.chmonitor.dev"
custom_domain = true
