# wrangler.toml — chmonitor cloud-hooks worker (Cloud/SaaS only).
#
# Receives Polar billing webhooks, persists subscriptions to the SHARED chm-cloud
# D1 (the same database the dashboard reads — plan resolution is unchanged), and
# sends operator notifications to Telegram plus scheduled ops jobs. OSS/self-host
# never deploys this.
#
# Secrets (set with `wrangler secret put`, NEVER committed here):
#   POLAR_WEBHOOK_SECRET        verify inbound Polar events
#   POLAR_ACCESS_TOKEN          re-key Polar customer → org on first paid event
#   CLERK_SECRET_KEY            lazy Clerk org creation on first paid event
#   TELEGRAM_BOT_TOKEN          operator notifications
#   TELEGRAM_CHAT_ID            operator notifications target chat
#   GITHUB_TOKEN                file a GitHub issue per NEW Worker exception —
#                               PAT with `issues:write` on the repo (fallback
#                               when the GitHub App creds below are unset)
#   GH_APP_ID                   GitHub App id (the `duyetbot` app). With
#                               GH_APP_PRIVATE_KEY, issues are filed as the App
#                               (installation token) — takes precedence over
#                               GITHUB_TOKEN. App needs Issues: Read & write and
#                               must be installed on the repo.
#   GH_APP_PRIVATE_KEY          App private key as a PKCS#8 PEM (BEGIN PRIVATE
#                               KEY). Escaped \n newlines OK. Convert GitHub's
#                               PKCS#1 download once:
#                               openssl pkcs8 -topk8 -nocrypt -in key.pem -out pkcs8.pem
#   CF_OBSERVABILITY_API_TOKEN  read Worker exceptions via the Telemetry query
#                               API. Token scope: Account → Workers
#                               Observability → Read.
#
# GitHub App config (optional):
#   GH_APP_INSTALLATION_ID      installation id; unset → resolved from the repo
#                               and cached in CHM_HOOKS_KV.
#
# Exception-scan config (non-secret, optional — set via CI `--var`; sensible
# defaults baked in):
#   CF_ACCOUNT_ID                     Cloudflare account id (required to query)
#   GITHUB_REPOSITORY                 owner/repo (default chmonitor/chmonitor)
#   CHM_EXCEPTION_ISSUE_LABELS        default `bug,cloudflare-exception`
#   CHM_EXCEPTION_MAX_ISSUES_PER_RUN  rate cap, default 5
#   CHM_EXCEPTION_SCRIPTS             default `chmonitor-dash,chmonitor-hooks`
#
# No GitHub auth (neither App creds nor GITHUB_TOKEN), or CF_OBSERVABILITY_API_TOKEN
# / CF_ACCOUNT_ID unset → the exception-scan capability logs one line and no-ops
# (never crashes).
#
# Product→plan mapping (non-secret, set via CI `--var` or the dashboard, mirror
# apps/dashboard/.env.production so both Workers map products IDENTICALLY):
#   CHM_POLAR_SERVER, CHM_POLAR_PRODUCT_<PLAN>_<PERIOD>
# These are NOT required until the Polar endpoint is cut over to this worker
# (plans/103 step 3-4); until then the worker is deployed but dormant.
#
# Deploy with the unified per-Worker script (reads ./deploy.config.ts for the
# vars/secrets above, resolves them from the dashboard's
# .env.production(.local)/.env.preview, and runs wrangler for you):
#   bun scripts/deploy-worker.ts cloud-hooks [--env preview] [--dry-run]
# See docs/knowledge/deployment.md.

name = "chmonitor-hooks"
main = "src/index.ts"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat"]

minify = true

[observability]
enabled = true

# Cron triggers: daily billing summary + the 15-min ops sweep (full-surface
# health probes AND the Cloudflare exception → GitHub issue scan).
[triggers]
crons = ["0 0 * * *", "*/15 * * * *"]

# Custom domain — auto-provisions the hooks.chmonitor.dev DNS record on the
# managed zone (same pattern as the dashboard's dash.chmonitor.dev). The
# operator adds the Polar endpoint https://hooks.chmonitor.dev/webhooks/polar in
# the Polar dashboard as step 3 of the migration.
[[routes]]
pattern = "hooks.chmonitor.dev"
custom_domain = true

# Shared billing D1 (the SAME chm-cloud database the dashboard binds). The
# subscription-store monotonic guard makes concurrent writers safe.
[[d1_databases]]
binding = "CHM_CLOUD_D1"
database_name = "chm-cloud"
database_id = "cca247b6-9b25-41bd-b9ca-727b35bc6039"

# Ops-state KV. `runProbes` (src/probes.ts) stores the last-known up/down state
# per surface so the */15min cron notifies ONLY on transitions; `runExceptions`
# (src/exceptions.ts) stores exception fingerprints (`exc-fp:v1:<fp>`) so a NEW
# Worker exception is filed to GitHub exactly once. Absent → probes fall back to
# per-run state and the exception scan leans on its GitHub-search fallback.
# Follows the CHM_ binding-naming rule (like CHM_CLOUD_D1).
[[kv_namespaces]]
binding = "CHM_HOOKS_KV"
id = "a1d9bd2c4377493eac5b5d4ad04dcc34"

# ─────────────────────────────────────────────────────────────────────────────
# Preview environment (PR deploys). Reuses the same shared D1.
# ─────────────────────────────────────────────────────────────────────────────
[env.preview]
name = "preview-chmonitor-hooks"

[[env.preview.d1_databases]]
binding = "CHM_CLOUD_D1"
database_name = "chm-cloud"
database_id = "cca247b6-9b25-41bd-b9ca-727b35bc6039"

[[env.preview.kv_namespaces]]
binding = "CHM_HOOKS_KV"
id = "a1d9bd2c4377493eac5b5d4ad04dcc34"
