# wrangler.toml — chmonitor TanStack Start dashboard worker.
#
# `main` resolves the built-in TanStack Start server entry from node_modules;
# the @cloudflare/vite-plugin produces the worker bundle + client asset
# manifest at build time, so no explicit [assets] block is required.
#
# Public defaults only — real hosts/users are injected per-environment at deploy time via CI secrets.

name = "chmonitor-dash"
main = "@tanstack/react-start/server-entry"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[observability]
enabled = true

# Workers Cache (launched 2026-07-06): Cloudflare's tiered cache sits in front of
# this Worker. Enabled, but with NO public caching of any dashboard route — the
# dashboard is per-user (Clerk) and per-host, so every SSR / data / API response
# stays uncached. This flag is safe by default: only responses with an explicit
# `Cache-Control: public` are ever stored, and this app deliberately sets none
# (data routes use `no-store` / `private`, or `s-maxage` which targets a shared
# CDN cache, not this worker cache's `public` directive). Clerk auth cookies are
# NOT `Authorization` headers, so we never mark a dashboard response `public`.
# See docs/knowledge/workers-cache.md.
[cache]
enabled = true

# D1 database for AI agent conversations + per-user connections + billing
# subscriptions (subscription-store / user-connections / conversation-store).
[[d1_databases]]
binding = "CHM_CLOUD_D1"
database_name = "chm-cloud"
database_id = "cca247b6-9b25-41bd-b9ca-727b35bc6039"
migrations_dir = "./src/db/conversations-migrations"

# KV cache for the /api/v1/data dashboard-query allowlist (issue #2185). Backs
# the in-memory L1 (cache-manager.ts, 5-min TTL) with an L2 that survives
# Worker isolate churn on cold starts. Optional/zero-config: code auto-detects
# this binding (see lib/api/data/dashboard-query-kv-cache.ts, same pattern as
# lib/version-cache.ts's CHM_VERSION_CACHE_KV) and falls back to in-memory-only
# when absent, so self-hosted/Docker/K8s deploys (no KV binding) are unaffected.
# A KV miss or read error is always treated as a cache miss (fail-closed) —
# never as an implicit allow.
[[kv_namespaces]]
binding = "CHM_DASHBOARD_QUERY_KV"
id = "98b43d2d6fcf438cbd91e18e38b4212d"
preview_id = "44390b843ada46d8beb47c99bcf24115"

# Durable Object migrations.
# The legacy Next.js worker (same name, chmonitor-dash) registered two SQLite
# Durable Objects: DOQueueHandler (OpenNext queue) and AgentConversationDurableObject
# (agent chat history). The TanStack Start app uses neither — conversations now
# live in CHM_CLOUD_D1 — so deploying over the existing worker requires an
# explicit delete-class migration (Cloudflare refuses to silently drop a DO).
# v1/v2 are the legacy worker's already-applied history (kept so wrangler can
# sequence v3 after them); v3 removes both classes.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DOQueueHandler"]

[[migrations]]
tag = "v2-agent-conversations"
new_sqlite_classes = ["AgentConversationDurableObject"]

[[migrations]]
tag = "v3-drop-legacy-next-dos"
deleted_classes = ["DOQueueHandler", "AgentConversationDurableObject"]

# ─────────────────────────────────────────────────────────────────────────────
# Production: custom domain for the dashboard. The TanStack Start app is now the
# official dashboard, having replaced the legacy Next.js app (#1392).
# ─────────────────────────────────────────────────────────────────────────────
[[routes]]
pattern = "dash.chmonitor.dev"
custom_domain = true

# ─────────────────────────────────────────────────────────────────────────────
# Version + table-existence L2 cache (Cloudflare KV) — EXAMPLE, NOT ACTIVE.
# See issue #2183. `lib/version-cache.ts` / `lib/table-existence-kv-cache.ts`
# back the per-isolate ClickHouse-version and table-existence caches
# (`@chm/clickhouse-client/clickhouse-version` /
# `@chm/clickhouse-client/table-existence-cache`) with a KV L2 so they survive
# Worker isolate churn instead of re-querying `SELECT version()` /
# `system.tables` on every cold start. ACTIVE — provisioned in #2319.
#
# Self-host has no KV binding by design, so both caches always fall back to
# their in-memory-only (L1) behavior — identical to today — whenever this
# binding is absent (Docker/K8s/Node). The namespace TITLEs are
# chmonitor-prefixed so they're identifiable in the shared Cloudflare account;
# the worker BINDING stays CHM_VERSION_CACHE_KV — title and binding are
# independent. `id` = chmonitor-version-cache, `preview_id` =
# chmonitor-version-cache-preview.
[[kv_namespaces]]
binding = "CHM_VERSION_CACHE_KV"
id = "f2efbec5955a4772a01e32e7e35c35f5"
preview_id = "1f8ab0acc6114802bf5c14d883dae341"
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Inbound event bus (Cloudflare Queues) — EXAMPLE, NOT ACTIVE.
# See plans/36-inbound-event-bus-queues.md. POST /api/events/ingest and the
# consumer (lib/events/queue-consumer.ts processEventBatch) are implemented
# and unit-tested, but this binding is intentionally left commented out:
# `wrangler deploy` fails hard if a `[[queues.producers]]`/`[[queues.consumers]]`
# block references a queue that doesn't exist yet, which would break the next
# CI deploy. Cloudflare Queues are cloud-only — self-host has no Queue binding
# by design, so /api/events/ingest always runs its synchronous inline path
# (same code path a missing/erroring binding falls back to on cloud) until an
# operator completes this setup:
#
#   1. wrangler queues create chmonitor-inbound-events
#      wrangler queues create chmonitor-inbound-events-dlq
#   2. Uncomment the blocks below (top-level = production; mirror into
#      [env.preview] with its own queue, or reuse the same one).
#   3. Add a worker entry that also exports `queue()` (the default
#      `@tanstack/react-start/server-entry` only exports `fetch` — wrap it with
#      `createServerEntry` from that package and call
#      `processEventBatch` from lib/events/queue-consumer.ts), and point
#      `main` at it instead of the package's default-entry.
#   4. Redeploy.
#
# [[queues.producers]]
# binding = "CHM_EVENTS_QUEUE"
# queue = "chmonitor-inbound-events"
#
# [[queues.consumers]]
# queue = "chmonitor-inbound-events"
# max_batch_size = 10
# max_retries = 3
# dead_letter_queue = "chmonitor-inbound-events-dlq"
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Worker runtime [vars] are intentionally NOT declared here.
#
# Single source of truth = the committed `.env.production` (+ `.env.preview` overlay).
# `scripts/patch-wrangler-env.ts` reads those files at deploy and injects the
# non-VITE_ keys as worker vars into the generated `dist/server/wrangler.json`
# (the @cloudflare/vite-plugin strips [vars] from it anyway). The same files feed
# the vite client build, so each value (CHM_CLOUD_MODE, CHM_AUTH_PROVIDER,
# CHM_FEATURE_USER_CONNECTIONS_DB, …) is defined exactly ONCE and stays identical
# across Wrangler and Docker/K8s. Secrets are set separately via set-secrets.ts.
# Edit env in `.env.production` / `.env.preview` — never re-add a [vars] block here.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Reverse-proxy auth (EXAMPLE — not active; the dashboard uses `clerk`).
# Set CHM_AUTH_PROVIDER = "proxy" to authenticate requests via a trusted proxy.
# Two mechanisms; either success authenticates a request:
#
#   (a) Cloudflare Access — verifies the signed `Cf-Access-Jwt-Assertion` JWT.
#       CHM_CF_ACCESS_TEAM_DOMAIN is your Access team URL; CHM_CF_ACCESS_AUD is
#       the Access application AUD tag.
#   (b) Trusted identity header — read CHM_PROXY_AUTH_HEADER (default
#       `X-Forwarded-User`) ONLY when the request also presents the shared
#       secret `CHM_PROXY_AUTH_SECRET` (set via `wrangler secret put`, never a
#       plaintext var). Without the secret, header trust is disabled because any
#       client could forge it on a publicly-reachable worker.
#
# CHM_AUTH_PROVIDER = "proxy"
# CHM_CF_ACCESS_TEAM_DOMAIN = "https://your-team.cloudflareaccess.com"
# CHM_CF_ACCESS_AUD = "<access-application-aud-tag>"
# CHM_PROXY_AUTH_HEADER = "X-Forwarded-User"
# CHM_PROXY_AUTH_SECRET via: wrangler secret put CHM_PROXY_AUTH_SECRET

# ─────────────────────────────────────────────────────────────────────────────
# Cron triggers. These secret-gated GET routes (see src/routes/api/cron/) are
# invoked by a scheduler that forwards CRON_SECRET as `Authorization: Bearer
# <secret>` (an external scheduler, or a Cloudflare Cron that forwards the
# secret to the route's URL — see docs/content/guide/features/health.mdx). The
# schedules below document each cadence:
#   - "0 3 * * *"  → retention-prune, daily at 03:00 UTC.
#   - "0 8 * * 1"  → weekly-report, Mondays at 08:00 UTC (per-host opt-in via
#     CHM_WEEKLY_REPORT_HOSTS; no-op when unset).
# health-sweep (every 5 min) should be added here when that route is confirmed
# working end-to-end.
# ─────────────────────────────────────────────────────────────────────────────
[triggers]
crons = ["0 3 * * *", "0 8 * * 1"]

# ─────────────────────────────────────────────────────────────────────────────
# Preview environment for PR deployments
# Deployed by GitHub Actions on pull requests (see .github/workflows/cloudflare.yml)
# and reachable at https://preview.dash.chmonitor.dev.
# Inherits most top-level settings; vars require explicit declaration.
#
# One-time setup required:
#   wrangler secret put CLICKHOUSE_PASSWORD --env preview
# ─────────────────────────────────────────────────────────────────────────────
[env.preview]
name = "preview-chmonitor-dash"

# Custom domain for the preview worker.
[[env.preview.routes]]
pattern = "preview.dash.chmonitor.dev"
custom_domain = true

# Reuse the same conversation D1 database (shared preview/prod for now).
[[env.preview.d1_databases]]
binding = "CHM_CLOUD_D1"
database_name = "chm-cloud"
database_id = "cca247b6-9b25-41bd-b9ca-727b35bc6039"
migrations_dir = "./src/db/conversations-migrations"

# Reuse the same dashboard-query allowlist KV namespace (shared preview/prod
# for now, same pattern as CHM_CLOUD_D1 above). Cached entries are non-secret
# (they mirror rows already readable from the dashboard's own charts table).
[[env.preview.kv_namespaces]]
binding = "CHM_DASHBOARD_QUERY_KV"
id = "98b43d2d6fcf438cbd91e18e38b4212d"
preview_id = "44390b843ada46d8beb47c99bcf24115"

# Version + table-existence L2 cache (#2319). KV namespaces are not inherited by
# named environments, so repeat the top-level CHM_VERSION_CACHE_KV binding here.
[[env.preview.kv_namespaces]]
binding = "CHM_VERSION_CACHE_KV"
id = "f2efbec5955a4772a01e32e7e35c35f5"
preview_id = "1f8ab0acc6114802bf5c14d883dae341"

# DO migrations are not inherited by named environments — repeat the chain that
# drops the legacy preview worker's Durable Objects (see top-level note).
[[env.preview.migrations]]
tag = "v1"
new_sqlite_classes = ["DOQueueHandler"]

[[env.preview.migrations]]
tag = "v2-agent-conversations"
new_sqlite_classes = ["AgentConversationDurableObject"]

[[env.preview.migrations]]
tag = "v3-drop-legacy-next-dos"
deleted_classes = ["DOQueueHandler", "AgentConversationDurableObject"]

# Preview worker [vars] also come from .env.production + .env.preview via
# `scripts/patch-wrangler-env.ts --env preview` (see the top-level note above) —
# never re-declare [env.preview.vars] here.
