# wrangler.toml — chmonitor telemetry collector
#
# Public, write-only ingest for the anonymous instance ping + aggregate events
# emitted by apps/dashboard/src/lib/telemetry. Records to Cloudflare D1
# (forever retention, free tier).
#
# Deploy:
#   cd apps/telemetry && pnpm run deploy
#
# Point instances at it by setting, on the dashboard deployment:
#   CHM_TELEMETRY=on
#   CHM_TELEMETRY_ENDPOINT=https://telemetry.chmonitor.dev/v1/ping
# (Both are required — telemetry is inert unless flag AND endpoint are set.)

name = "chmonitor-telemetry"
main = "src/index.ts"
compatibility_date = "2026-05-28"

minify = true
upload_source_maps = false

compatibility_flags = ["global_fetch_strictly_public"]

[observability]
enabled = true

[cache]
enabled = true

# D1 — primary store (forever retention). One deduped row per install per UTC
# day; events stored in a separate table. Free tier, no cron, no API token.
#
# Provisioned 2026-07-07 (duyet account).
[[d1_databases]]
binding = "CHM_TELEMETRY_DB"
database_name = "chm_telemetry"
database_id = "4887176b-0181-45bf-970f-a506f514d5a9"
migrations_dir = "migrations"

# Custom domain — auto-provisions DNS + cert on the chmonitor.dev zone.
[[routes]]
pattern = "telemetry.chmonitor.dev"
custom_domain = true

# ─────────────────────────────────────────────────────────────────────────────
# Preview environment
# ─────────────────────────────────────────────────────────────────────────────
[env.preview]
name = "preview-chmonitor-telemetry"

[[env.preview.routes]]
pattern = "preview.telemetry.chmonitor.dev"
custom_domain = true
